          <label style="font-size:13px;color:#555;">日付</label>
          <input type="date" id="rec-date" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:10px;font-size:14px;">
          <label style="font-size:13px;color:#555;">残業時間（時間）</label>
          <input type="number" id="overtime" placeholder="例: 2.5" min="0" max="24" step="0.5" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:10px;font-size:14px;">
          <label style="font-size:13px;color:#555;">総労働時間（時間）</label>
          <input type="number" id="total-hours" placeholder="例: 10.0" min="0" max="24" step="0.5" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:10px;font-size:14px;">
          <label style="font-size:13px;color:#555;">有給取得</label>
          <select id="paid-leave" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:10px;font-size:14px;">

          <button class="btn" style="margin-top:16px;" onclick="addEntry()">追加する</button>

    <script>
    // ★ここだけ実装（約12行）★
    const KEY='work-hour-tracker';
    function getEntryData(){{
      const date=document.getElementById('rec-date').value;
      const ot=parseFloat(document.getElementById('overtime').value||'0');
      const th=parseFloat(document.getElementById('total-hours').value||'0');
      const pl=parseFloat(document.getElementById('paid-leave').value||'0');
      if(!date){{ alert('日付を入力してください'); return null; }}
      if(isNaN(ot)||ot<0){{ alert('残業時間を正しく入力してください'); return null; }}
      return {{ date, ot, th, pl }};
    }}
    function renderEntry(e){{
      const alert36=e.ot>45?'<span style="color:#ef4444;font-size:11px;margin-left:6px;">⚠ 36協定注意</span>':'';
      const plStr=e.pl==1?'有給1日':e.pl==0.5?'有給0.5日':'';
      return `<div style="padding:10px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;">${{e.date}} 残業<b>${{e.ot}}</b>h 労働<b>${{e.th}}</b>h ${{plStr}}${{alert36}}</span><button onclick="del(${{e.id}})" style="color:#ef4444;border:none;background:none;cursor:pointer;font-size:16px;">×</button></div>`;
    }}
    function getSummary(entries){{
      const totalOt=entries.reduce((s,e)=>s+e.ot,0);
      const totalTh=entries.reduce((s,e)=>s+e.th,0);
      const totalPl=entries.reduce((s,e)=>s+e.pl,0);
      const warn=totalOt>45?`<p style="color:#ef4444;font-weight:700;margin-top:8px;">⚠ 残業累計が45時間を超えています（36協定上限）</p>`:'';
      return `<p style="font-size:14px;color:#333;">残業累計: <b>${{totalOt.toFixed(1)}}時間</b>　総労働: <b>${{totalTh.toFixed(1)}}時間</b>　有給: <b>${{totalPl}}日</b></p>${{warn}}`;
    }}
    // ★以下変更不要★
    let entries=JSON.parse(localStorage.getItem(KEY)||'[]');
    document.addEventListener('DOMContentLoaded',()=>{{ renderAll(); }});
    function addEntry(){{
      const d=getEntryData(); if(!d) return;
      entries.unshift({{id:Date.now(),date:new Date().toLocaleDateString('ja-JP'),...d}});
      localStorage.setItem(KEY,JSON.stringify(entries));
      renderAll(); document.querySelectorAll('input:not([type=submit])').forEach(i=>i.value='');
      document.getElementById('result').classList.add('show');
    }}
    function del(id){{ entries=entries.filter(e=>e.id!==id); localStorage.setItem(KEY,JSON.stringify(entries)); renderAll(); }}
    function renderAll(){{
      const c=document.getElementById('entries'); const ec=document.getElementById('entry-count');
      if(ec) ec.textContent=entries.length+'件';
      c.innerHTML=entries.length?entries.map(renderEntry).join(''):'<p style="text-align:center;color:#bbb;padding:16px;">まだ記録がありません</p>';
      const s=document.getElementById('summary'); if(s) s.innerHTML=getSummary(entries);
    }}
    </script>
